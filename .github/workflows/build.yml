name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x64
          # Linux x86_64
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux-x64
          # macOS ARM64 (Apple Silicon)
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.label }})

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20

      # `npm ci` on the macOS runner has produced flaky/incomplete installs:
      #   * The committed lockfile must resolve tarballs from registry.npmjs.org
      #     (a prior lockfile pinned everything to a distant mirror, which made
      #     the US-based runners' fetches slow and unreliable). Guard against a
      #     regression of that.
      #   * npm 10.x can abort mid-install with "Exit handler never called!"
      #     (npm/cli#4769) yet still exit 0, leaving an INCOMPLETE install, and
      #     it can silently skip the platform-specific @tauri-apps/cli native
      #     binary (an OPTIONAL dep) while still linking the `tauri` .bin shim.
      #     Either way the build later dies with `tauri: command not found`
      #     (exit 127) or "Failed to load native binding".
      # So: retry `npm ci`, and gate success on the tauri CLI actually RUNNING
      # (which loads the native binary), not merely on the shim file existing.
      - name: Install npm dependencies
        shell: bash
        run: |
          set +e
          if grep -q 'registry\.npmmirror\.com' package-lock.json; then
            echo "::error::package-lock.json resolves tarballs from registry.npmmirror.com; regenerate it against registry.npmjs.org"
            exit 1
          fi
          for attempt in 1 2 3; do
            echo "::group::npm ci (attempt $attempt)"
            npm ci
            status=$?
            echo "::endgroup::"
            if [ $status -eq 0 ] && node_modules/.bin/tauri --version >/dev/null 2>&1; then
              echo "npm ci succeeded and the tauri CLI is runnable."
              exit 0
            fi
            echo "::warning::npm ci attempt $attempt failed (exit $status) or produced an unrunnable tauri CLI; cleaning and retrying"
            rm -rf node_modules
            sleep 5
          done
          echo "::error::npm ci failed to produce a runnable tauri CLI after 3 attempts"
          exit 1

      # Linux-specific system dependencies
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config \
            libssh2-1-dev \
            libudev-dev \
            libdbus-1-dev

      # macOS: install dependencies for native compilation
      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install openssl libssh2 pkg-config

      # Extract this version's section from CHANGELOG.md so the GitHub Release
      # body is version-specific (matched by the pushed tag, e.g. v0.2.0 ->
      # the "## v0.2.0 - ..." section). Falls back to a generic line if absent.
      - name: Release notes from CHANGELOG
        id: notes
        shell: bash
        run: |
          VER="${GITHUB_REF_NAME#v}"
          BODY=""
          if [ -f CHANGELOG.md ]; then
            BODY="$(awk -v ver="v$VER" '
              $0 ~ ("^## " ver "([^0-9]|$)") { cap = 1; next }
              cap && /^## v/ { exit }
              cap { print }
            ' CHANGELOG.md)"
          fi
          # Drop leading blank lines.
          BODY="$(printf '%s\n' "$BODY" | sed -e '/./,$!d')"
          if [ -z "$BODY" ]; then
            BODY="See the assets to download this version and install."
          fi
          {
            echo "body<<CHANGELOG_EOF"
            printf '%s\n' "$BODY"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: --target ${{ matrix.target }}
          # Only create/upload a GitHub Release on tag pushes (v*). On PRs and
          # main pushes tagName/releaseName are empty, so tauri-action just
          # builds — the binaries are still kept via the upload-artifact step
          # below. This stops concurrent PR/main builds from colliding while
          # uploading identically-named assets to the same shared draft release.
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && 'v__VERSION__' || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && 'GWShell v__VERSION__' || '' }}
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true

      # Create portable zip (Windows only)
      - name: Create Portable ZIP (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $exe = Get-ChildItem "src-tauri/target/${{ matrix.target }}/release/GWShell.exe" -ErrorAction SilentlyContinue
          if ($exe) {
            Compress-Archive -Path $exe.FullName -DestinationPath "src-tauri/target/${{ matrix.target }}/release/GWShell-portable-${{ matrix.label }}.zip"
          }

      - name: Upload build artifacts
        uses: actions/upload-artifact@v5
        with:
          name: gwshell-${{ matrix.label }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.nsis.zip
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.nsis.zip.sig
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage.tar.gz
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage.tar.gz.sig
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.app.tar.gz
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.app.tar.gz.sig
            src-tauri/target/${{ matrix.target }}/release/GWShell-portable-*.zip
          if-no-files-found: warn

      # Upload portable ZIP to the GitHub Release (Windows only)
      - name: Upload Portable ZIP to Release
        if: runner.os == 'Windows' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/${{ matrix.target }}/release/GWShell-portable-${{ matrix.label }}.zip
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
